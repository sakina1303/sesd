services:
  - type: web
    name: retrievai-api
    runtime: python
    plan: free
    buildCommand: |
      cd backend && \
      pip install -r requirements.txt && \
      cd ../frontend && \
      npm install && \
      npm run build && \
      cd ..
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT "app:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: retrievai-db
    databaseName: retrievai
    user: retrievai_user
    plan: free
